const img = new Image();
img.onload = () => {
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    c.width = img.width; c.height = img.height;
    ctx.drawImage(img, 0, 0);
    const imageData = ctx.getImageData(0, 0, c.width, c.height);
    const data = imageData.data;
    const threshold = 50;
    for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        if (r < threshold && g < threshold && b < threshold) {
            data[i+3] = 0;
        } else if (r < threshold*1.8 && g < threshold*1.8 && b < threshold*1.8) {
            const brightness = (r + g + b) / 3;
            data[i+3] = Math.round(Math.min(255, Math.max(0, (brightness - threshold) / (threshold*0.8) * 255)));
        }
    }
    ctx.putImageData(imageData, 0, 0);
    document.getElementById('dl').href = c.toDataURL('image/png');
    document.getElementById('status').textContent = 'DONE - Click download link below';
    document.title = 'DONE';
};
