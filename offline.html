<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | VIR2OSE Studio</title>
    <meta name="theme-color" content="#0a0a0a">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold-primary: #C5A55A;
            --bg-dark: #0a0a0a;
            --text-main: #f0f0f0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        .container {
            border: 1px solid rgba(197, 165, 90, 0.2);
            padding: 40px;
            border-radius: 15px;
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
            max-width: 500px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            color: var(--gold-primary);
            text-shadow: 0 0 15px rgba(197, 165, 90, 0.4);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        p {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        a {
            display: inline-block;
            background: var(--gold-primary);
            color: var(--bg-dark);
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        a:hover {
            box-shadow: 0 0 15px rgba(197, 165, 90, 0.5);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>OFFLINE</h1>
        <p>Du hast aktuell keine Internetverbindung. Bitte prüfe deine Netzwerkverbindung, um VIR2OSE Studio weiterhin
            nutzen zu können.</p>
        <a href="index.html">NOCHMAL VERSUCHEN</a>
    </div>
</body>

</html>
